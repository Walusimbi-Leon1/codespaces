<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web (Codespace)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #25D366; }
        
        /* QR Section */
        #qr-section { text-align: center; padding: 40px; }
        #qr-section h2 { margin-bottom: 20px; }
        #qr-section p { margin-bottom: 20px; color: #888; }
        #qr-code { display: inline-block; background: white; padding: 20px; border-radius: 12px; }
        #qr-code img { display: block; }
        #qr-code svg { display: block; width: 300px; height: 300px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; }
        .status-badge.connected { background: #1a5c2a; color: #25D366; }
        .status-badge.disconnected { background: #5c1a1a; color: #ff4444; }
        .status-badge.waiting { background: #5c4a1a; color: #ffaa00; }
        
        /* Connected UI */
        #chat-ui { display: none; }
        .layout { display: grid; grid-template-columns: 300px 1fr; gap: 0; height: calc(100vh - 100px); border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; }
        .sidebar h3 { padding: 15px; border-bottom: 1px solid #333; font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar .contact-item { padding: 12px 15px; border-bottom: 1px solid #222; cursor: pointer; transition: background 0.2s; }
        .sidebar .contact-item:hover { background: #252525; }
        .sidebar .contact-item .name { font-weight: 600; font-size: 0.9rem; }
        .sidebar .contact-item .preview { font-size: 0.8rem; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar .contact-item .unread { display: inline-block; background: #25D366; color: #111; border-radius: 10px; padding: 1px 8px; font-size: 0.7rem; font-weight: bold; margin-left: 8px; }
        
        /* Main Chat Area */
        .chat-area { display: flex; flex-direction: column; background: #0d0d0d; }
        .chat-header { padding: 15px; border-bottom: 1px solid #333; background: #1a1a1a; }
        .chat-header h3 { font-size: 1rem; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 70%; padding: 8px 14px; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; }
        .message.received { background: #1a1a2e; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.sent { background: #0a3a1a; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message .msg-time { font-size: 0.65rem; color: #666; margin-top: 4px; text-align: right; }
        .message .msg-sender { font-size: 0.7rem; color: #25D366; font-weight: 600; margin-bottom: 2px; }
        
        .chat-input { display: flex; gap: 10px; padding: 15px; border-top: 1px solid #333; background: #1a1a1a; }
        .chat-input input { flex: 1; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #222; color: #e0e0e0; font-size: 0.9rem; outline: none; }
        .chat-input input:focus { border-color: #25D366; }
        .chat-input button { padding: 12px 24px; background: #25D366; color: #111; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .chat-input button:hover { background: #20bd5e; }
        
        .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 1rem; }
        .placeholder p { text-align: center; }
        
        /* Connection info */
        .conn-info { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; }
        .conn-info code { background: #252525; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; color: #25D366; }
        
        .actions { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .actions button, .actions a { padding: 8px 16px; border: 1px solid #333; border-radius: 6px; background: #1a1a1a; color: #e0e0e0; cursor: pointer; text-decoration: none; font-size: 0.85rem; }
        .actions button:hover, .actions a:hover { background: #252525; border-color: #25D366; }
        
        .toast { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a5c2a; color: #e0e0e0; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; z-index: 999; }
        .toast.show { display: block; }
        
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; height: auto; }
            .sidebar { max-height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 WhatsApp Web (Codespace)</h1>
        
        <!-- QR Code Section (shown when not connected) -->
        <div id="qr-section">
            <div id="connection-status"></div>
            <div id="qr-code"></div>
            <p id="qr-instructions" style="margin-top: 20px; color: #888;">
                Open WhatsApp on your phone → Settings → Linked Devices → Link a Device → Scan QR
            </p>
        </div>
        
        <!-- Connected Chat UI (shown when connected) -->
        <div id="chat-ui">
            <div class="layout">
                <div class="sidebar">
                    <h3>💬 Recent Chats</h3>
                    <div id="chat-list"></div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <h3 id="chat-title">Select a chat</h3>
                    </div>
                    <div class="chat-messages" id="message-area">
                        <div class="placeholder"><p>Select a chat from the sidebar to view messages</p></div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="message-input" placeholder="Type a message..." disabled>
                        <button id="send-btn" disabled>Send</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Connection Info -->
        <div class="conn-info">
            <strong>🔗 Access URL:</strong> <code id="access-url">http://localhost:3030</code>
            <div class="actions">
                <button onclick="restartClient()">🔄 Restart Connection</button>
                <a href="/api/messages" target="_blank">📄 View Raw Messages</a>
                <a href="/api/chats" target="_blank">📋 View Chats API</a>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        let ws = null;
        let currentChat = null;
        let isConnected = false;
        
        // ─── WebSocket Connection ──────────────────────────────
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => console.log('🔗 WebSocket connected');
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleEvent(data);
            };
            
            ws.onclose = () => {
                console.log('❌ WebSocket disconnected, retrying in 3s...');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (err) => console.error('WebSocket error:', err);
        }
        
        // ─── Event Handler ─────────────────────────────────────
        function handleEvent(data) {
            switch (data.type) {
                case 'qr':
                    showQR(data.qr);
                    break;
                case 'ready':
                    isConnected = true;
                    showConnected();
                    break;
                case 'disconnected':
                    isConnected = false;
                    showDisconnected(data.reason);
                    break;
                case 'message':
                    addMessage(data.message);
                    break;
                case 'error':
                    showToast(data.message || 'An error occurred');
                    break;
            }
        }
        
        // ─── UI: QR Code ───────────────────────────────────────
        function showQR(qr) {
            document.getElementById('qr-section').style.display = 'block';
            document.getElementById('chat-ui').style.display = 'none';
            
            const qrContainer = document.getElementById('qr-code');
            qrContainer.innerHTML = '';
            
            // Generate QR as image via API
            const qrImg = document.createElement('img');
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qr)}`;
            qrImg.alt = 'WhatsApp QR Code';
            qrImg.onerror = () => {
                // Fallback: show raw QR text
                qrContainer.innerHTML = `<pre style="color:#333;font-size:0.7rem;word-break:break-all;">${qr.substring(0, 200)}...</pre>`;
            };
            qrContainer.appendChild(qrImg);
            
            setStatus('waiting', '📱 Scan the QR code with WhatsApp');
        }
        
        // ─── UI: Connected State ───────────────────────────────
        function showConnected() {
            document.getElementById('qr-section').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'block';
            setStatus('connected', '✅ Connected');
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            loadChats();
            showToast('✅ WhatsApp connected!');
        }
        
        function showDisconnected(reason) {
            document.getElementById('qr-section').style.display = 'block';
            document.getElementById('chat-ui').style.display = 'none';
            setStatus('disconnected', '❌ Disconnected: ' + (reason || 'unknown'));
        }
        
        function setStatus(type, text) {
            const el = document.getElementById('connection-status');
            el.innerHTML = `<span class="status-badge ${type}">${text}</span>`;
        }
        
        // ─── UI: Chats ─────────────────────────────────────────
        async function loadChats() {
            try {
                const resp = await fetch('/api/chats');
                const data = await resp.json();
                const list = document.getElementById('chat-list');
                list.innerHTML = '';
                
                if (!data.chats || data.chats.length === 0) {
                    list.innerHTML = '<div style="padding:20px;color:#666;text-align:center;">No chats found</div>';
                    return;
                }
                
                data.chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.innerHTML = `
                        <div class="name">${chat.name || 'Unknown'}
                            ${chat.unreadCount > 0 ? `<span class="unread">${chat.unreadCount}</span>` : ''}
                        </div>
                        <div class="preview">${chat.id}</div>
                    `;
                    div.onclick = () => selectChat(chat.id, chat.name);
                    list.appendChild(div);
                });
            } catch (err) {
                console.error('Failed to load chats:', err);
            }
        }
        
        function selectChat(chatId, chatName) {
            currentChat = chatId;
            document.getElementById('chat-title').textContent = chatName || chatId;
            document.getElementById('message-area').innerHTML = '<div class="placeholder"><p>Messages will appear here as they come in</p></div>';
        }
        
        // ─── UI: Messages ──────────────────────────────────────
        function addMessage(msg) {
            if (!isConnected) return;
            
            // Update or show message area
            const msgArea = document.getElementById('message-area');
            if (msgArea.querySelector('.placeholder')) {
                msgArea.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `message ${msg.fromMe ? 'sent' : 'received'}`;
            
            const time = new Date(msg.timestamp).toLocaleTimeString();
            const sender = msg.fromMe ? 'You' : (msg.name || msg.from);
            
            div.innerHTML = `
                ${!msg.fromMe ? `<div class="msg-sender">${sender}</div>` : ''}
                ${msg.body}
                <div class="msg-time">${time}</div>
            `;
            
            msgArea.appendChild(div);
            msgArea.scrollTop = msgArea.scrollHeight;
            
            // Update chat list on new message
            if (document.getElementById('chat-list').children.length <= 1) {
                loadChats();
            }
        }
        
        // ─── Send Message ──────────────────────────────────────
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('message-input').onkeydown = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message || !currentChat) return;
            
            try {
                const resp = await fetch('/api/send-to-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId: currentChat, message })
                });
                const data = await resp.json();
                if (data.success) {
                    input.value = '';
                } else {
                    showToast('Error: ' + (data.error || 'Failed to send'));
                }
            } catch (err) {
                showToast('Error sending message');
            }
        }
        
        // ─── Restart ───────────────────────────────────────────
        async function restartClient() {
            showToast('🔄 Restarting... reload page after a moment');
            // Just reload the page - client auto-reconnects
            setTimeout(() => location.reload(), 2000);
        }
        
        // ─── Toast ─────────────────────────────────────────────
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show';
            setTimeout(() => el.className = 'toast', 3000);
        }
        
        // ─── Init ──────────────────────────────────────────────
        // Show the access URL
        document.getElementById('access-url').textContent = window.location.href;
        
        connectWebSocket();
        
        // Poll for QR if not connected yet
        setInterval(async () => {
            if (isConnected) return;
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                if (data.hasQr) {
                    const qrResp = await fetch('/api/qr');
                    const qrData = await qrResp.json();
                    if (qrData.qr) showQR(qrData.qr);
                }
            } catch(e) {}
        }, 3000);
    </script>
</body>
</html>
